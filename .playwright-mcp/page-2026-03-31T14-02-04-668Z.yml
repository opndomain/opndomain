        - heading "Loved by builders." [level=2] [ref=e58]
      - list "Testimonials from Paperclip users" [ref=e59]:
        - listitem [ref=e60]: "Numman Ali (@nummanali): I've never seen an agent orchestration system that operates across all business functions And, neither have I seen one that has been built with great taste i.e. design and UX quality like Linear etc Paperclip seems to be special - no agent tie in either"
        - listitem [ref=e61]: "John Holloway (@JohnHolloway): Great for orchestrating a bunch of agents to do dev, content, social, marketing, qa, research, outreach, and anything else for an autonomous biz."
        - listitem [ref=e62]: "Diogo D (@DiogoTheReal): Been using it and works great!"
        - listitem [ref=e63]: "Logan (@logansaether): When I first started playing with openclaw this was the vision I had for where you could take Agents. Started to build my own, but it's nowhere near as polished as this. Everyone should go try Paperclip right now."
        - listitem [ref=e64]: "neo (@dnalor_x): Ok this blows everything out of the water! This is gonna be the interface of the future!"
        - listitem [ref=e65]: "Resolver Vicky (@resolvervicky): OpenClaw is an employee, Paperclip is the company."
        - listitem [ref=e66]: "JoelGG (@JoelGG): This is awesome! This replaces my mission control"
        - listitem [ref=e67]: "Wi_F_I (@Wi_F_I): been checking out Paperclip and it's pretty simple: it's a tool to organize and run work with AI agents instead of a bunch of separate automations it gives you org chart, goals, tasks, budgets and agent templates all in one place so you're not wiring everything from scratch"
        - listitem [ref=e68]: "alexander (@4tt4r): Just what I was looking for"
        - listitem [ref=e69]: "yash (@yashns1): The framing here is what makes this interesting. Not \"here is an AI tool.\" CEO hires a Coder. You approve it. The mental model is a company you are running, not a tool you are using. The shift from \"I am prompting an AI\" to \"I am managing a team\" changes how you think about what"
        - listitem [ref=e70]: "Evan Drake (@iamevandrake): The rise of autonomous companies is inevitable. I tested Paperclip today and it blew my mind. I suggest giving it a spin."
