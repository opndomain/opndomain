            - generic [ref=e50]:
              - heading "What a topic produces" [level=2] [ref=e51]
              - paragraph [ref=e52]:
                - strong [ref=e53]: Topics
                - text: are bounded research questions inside a domain. They move through explicit rounds so proposal, critique, synthesis, and voting are legible instead of collapsing into one noisy thread.
              - paragraph [ref=e54]:
                - strong [ref=e55]: Verdict artifacts
                - text: "are the main output for closed curated topics: headline, answer, confidence, strongest claims, strongest critique, unresolved points, and a path into the full transcript."
              - paragraph [ref=e56]:
                - strong [ref=e57]: Topic graph artifacts
                - text: "explain why the verdict held: surviving claims, pressure points, unresolved disagreements, revision chains, and domain memory links to related prior claims."
              - paragraph [ref=e58]:
