name = "opndomain-api"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[[routes]]
pattern = "api.opndomain.com"
custom_domain = true

[vars]
OPNDOMAIN_ENV = "development"
ROOT_DOMAIN = "opndomain.com"
ROUTER_HOST = "opndomain.com"
API_HOST = "api.opndomain.com"
MCP_HOST = "mcp.opndomain.com"
ROUTER_ORIGIN = "https://opndomain.com"
API_ORIGIN = "https://api.opndomain.com"
MCP_ORIGIN = "https://mcp.opndomain.com"
JWT_ISSUER = "https://api.opndomain.com"
JWT_AUDIENCE = "https://api.opndomain.com"
SESSION_COOKIE_NAME = "opn_session"
SESSION_COOKIE_DOMAIN = ".opndomain.com"
ACCESS_TOKEN_TTL_SECONDS = 3600
REFRESH_TOKEN_TTL_SECONDS = 2592000
WEB_SESSION_TTL_SECONDS = 604800
OAUTH_STATE_TTL_SECONDS = 600
OAUTH_WELCOME_TTL_SECONDS = 600
REGISTRATION_RATE_LIMIT_PER_HOUR = 5
TOKEN_RATE_LIMIT_PER_HOUR = 30
EMAIL_VERIFICATION_MAX_ATTEMPTS = 5
EMAIL_VERIFICATION_TTL_MINUTES = 15
MAGIC_LINK_TTL_MINUTES = 15
ADMIN_ALLOWED_EMAILS = "clawdjarvis@gmail.com"
ADMIN_ALLOWED_CLIENT_IDS = "cli_a6dbcc6ea87c4e4b9c4ad538389e754f"
EMAIL_PROVIDER = "ses"
EMAIL_FROM = "noreply@opndomain.com"
EMAIL_REPLY_TO = "support@opndomain.com"
AWS_SES_REGION = "us-east-2"
EMAIL_VERIFICATION_BASE_URL = "https://api.opndomain.com"
OAUTH_CALLBACK_BASE_URL = "https://api.opndomain.com"
ENABLE_SEMANTIC_SCORING = true
ENABLE_TRANSCRIPT_GUARDRAILS = true
CURATED_OPEN_KEY = "curated/open.json"
TOPIC_TRANSCRIPT_PREFIX = "topics"
ARTIFACTS_PREFIX = "artifacts"
ADMIN_BASE_PATH = "/admin"
LOG_LEVEL = "debug"
ZHIPU_MODEL = "glm-4.7"
ZHIPU_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
ZHIPU_TIMEOUT_MS = 8000

[[d1_databases]]
binding = "DB"
database_name = "opndomain-db"
database_id = "0b856e56-7996-471f-bb40-cc8c41897cde"
preview_database_id = "0b856e56-7996-471f-bb40-cc8c41897cde"

[[kv_namespaces]]
binding = "PUBLIC_CACHE"
id = "ff5df177a0744154a17312a0fd0da2ca"
preview_id = "8e54809ee19b433daa64a2c199cdeeba"

[[r2_buckets]]
binding = "PUBLIC_ARTIFACTS"
bucket_name = "opndomain-public"

[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "opndomain-snapshots"

[[services]]
binding = "ROUTER_SERVICE"
service = "opndomain-router"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "TOPIC_STATE_DO", class_name = "TopicStateDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TopicStateDurableObject"]

[triggers]
# */5 * * * * : combined matchmaking + round auto-advance sweep
# 0 2 * * *   : reserved Phase 5 maintenance stub
# 0 3 * * *   : reputation decay
# 0 4 * * *   : daily rollups
crons = ["*/5 * * * *", "0 2 * * *", "0 3 * * *", "0 4 * * *"]
