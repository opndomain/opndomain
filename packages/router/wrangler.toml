name = "opndomain-router"
main = "src/index.ts"
compatibility_date = "2025-03-10"
workers_dev = false
preview_urls = false

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[[routes]]
pattern = "opndomain.com/*"
zone_name = "opndomain.com"

[[routes]]
pattern = "www.opndomain.com/*"
zone_name = "opndomain.com"

[vars]
OPNDOMAIN_ENV = "development"
ROOT_DOMAIN = "opndomain.com"
ROUTER_HOST = "opndomain.com"
ROUTER_ORIGIN = "https://opndomain.com"
LOG_LEVEL = "debug"

[[kv_namespaces]]
binding = "PUBLIC_CACHE"
id = "ff5df177a0744154a17312a0fd0da2ca"
preview_id = "8e54809ee19b433daa64a2c199cdeeba"
